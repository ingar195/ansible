---
- name: Configure Base System
  hosts: all
  become: true
  roles:
    - common

- name: Configure Wazuh Agents
  hosts: service_wazuh
  become: true
  roles:
    - wazuh_agent

- name: Setup Komodo Manager
  hosts: komodo_all
  roles:
    - docker
    - komodo

- name: Setup usbip
  hosts: usbip_host
  roles:
    - usb_ip_server

- name: Setup mini PCs
  hosts: mini_pc
  roles:
    - mini_pc