---
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [update, always]

- name: Install common packages
  apt:
    name:
      - python3
      - htop
      - git
      - curl
    state: present
  tags: [setup, packages]

- name: Upgrade all packages
  apt:
    upgrade: dist
    force_apt_get: yes
  tags: [update]

- name: Remove unused packages
  apt:
    autoremove: yes
    autoclean: yes
  tags: [update]

- name: Check if reboot is required
  stat:
    path: /var/run/reboot-required
  register: reboot_required
  tags: [update]

- name: Notify if reboot is needed
  debug:
    msg: "⚠️  Reboot is required on {{ inventory_hostname }}"
  when: reboot_required.stat.exists
  tags: [update]

- name: Install Chrony (NTP)
  apt:
    name: chrony
    state: present
  tags: [ntp, setup]

- name: Configure NTP Server
  lineinfile:
    path: /etc/chrony/chrony.conf
    regexp: '^pool '
    line: "pool {{ ntp_server }} iburst"
    backup: yes
  notify: Restart Chrony
  tags: [ntp, setup]

- name: Ensure Chrony is enabled and running
  service:
    name: chrony
    state: started
    enabled: yes
  tags: [ntp, setup]