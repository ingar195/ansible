---
- name: Install prerequisite packages
  apt:
    name:
      - gnupg
      - apt-transport-https
      - lsb-release
      - curl
      - sysvinit-utils
      - net-tools
    state: present

- name: Create keyrings directory
  file:
    path: /etc/apt/keyrings
    state: directory
    mode: '0755'

- name: Download Wazuh GPG Key
  get_url:
    url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
    dest: /etc/apt/keyrings/wazuh.asc
    mode: '0644'
    force: true

- name: Add Wazuh Repository
  apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/wazuh.asc] https://packages.wazuh.com/4.x/apt/ stable main"
    state: present
    filename: wazuh

- name: Install Wazuh Agent
  apt:
    name: wazuh-agent
    state: present
    update_cache: yes

- name: Configure Manager IP in ossec.conf
  replace:
    path: /var/ossec/etc/ossec.conf
    regexp: '<address>.*?</address>'
    replace: '<address>{{ wazuh_manager_ip }}</address>'
  notify: Restart Wazuh Agent

- name: Ensure Wazuh Agent is started and enabled
  service:
    name: wazuh-agent
    state: started
    enabled: yes

- name: Download Microsoft GPG key
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /usr/share/keyrings/microsoft.gpg
    mode: '0644'

- name: Add Microsoft Repository (Debian 12)
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft.gpg] https://packages.microsoft.com/debian/12/prod bookworm main"
    state: present
    filename: microsoft-prod

- name: Install Sysmon for Linux
  apt:
    name: 
      - sysmonforlinux
    state: present
    update_cache: yes

- name: Check Sysmon service status
  ansible.builtin.systemd:
    name: sysmon
  register: sysmon_service_check

- name: Initialize Sysmon if not installed/active
  ansible.builtin.command:
    cmd: sysmon -i -accepteula
  when: sysmon_service_check.status.ActiveState != 'active'
  changed_when: true

- name: Ensure Sysmon is enabled
  ansible.builtin.systemd:
    name: sysmon
    enabled: true
    state: started